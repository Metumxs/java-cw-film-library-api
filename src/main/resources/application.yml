spring:
  application:
    name: film_library_api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5454}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.flywaydb: info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true

jwt:
  public:
    key: ${JWT_PUBLIC_KEY_PATH:classpath:certs/public.pem}
  private:
    key: ${JWT_PRIVATE_KEY_PATH:classpath:certs/private.pem}